description = """
Purpose: Verifies Anneal properly rejects malformed names and missing syntax in named bounds.
Behavior: Introduces missing colons, invalid names, and Lean keywords as named bounds. Asserts the parser chokes correctly at the Rust syntax boundary or during doc-block validation, before hitting `generate.rs`.
"""

[test]
stderr_file = "expected.stderr"
args = ["verify", "--allow-sorry", "--unsound-allow-is-valid"]
expected_status = "failure"
