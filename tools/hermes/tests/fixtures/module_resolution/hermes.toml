description = """
Purpose: Tests all forms of Rust module resolution and scoping natively
supported by Hermes.

Behavior: Verifies module resolution across a variety of layouts:
- `mod foo;` mapping to `foo.rs`.
- Directory-based `mod bar;` mapping to `bar/mod.rs`.
- Inline module bodies (`mod baz { ... }`).
- Custom file paths (`#[path = "sys/unix.rs"] mod sys;`).
- Deeply nested paths mapping to `a/b.rs`.
- Loading the same physical file via multiple logical module declarations (`mod
  c;` and `#[path = "c.rs"] mod d;`), verifying that Charon properly isolates
  identical source definitions.
- Reaching entirely outside the project via `#[path = "../extra.rs"]`, verifying
  that Charon can track files outside the immediate source tree.
"""

[test]
args = ["verify", "--allow-sorry"]
extra_inputs = ["extra.rs"]

# The `args` field specifies a list of substrings that must be present in a
# single command invocation logged by Hermes (in this case, Charon). We use
# this to verify that Hermes discovers all deeply nested and multiply-mounted
# functions, dynamically constructing the correct `--start-from` argument
# string to pass to Charon.
[[test.command]]
args = ["--start-from", "crate::a::b::deep_proof,crate::bar::bar_fn,crate::baz::inline,crate::c::split_fn,crate::d::split_fn,crate::extra::external_fn,crate::foo::foo_fn,crate::root_dummy,crate::sys::syscall"]

[[test.artifact]]
package = "module_resolution"
target = "module_resolution"
should_exist = true
