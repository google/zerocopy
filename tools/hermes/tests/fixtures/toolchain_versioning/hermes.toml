description = """
Purpose: Validates version enforcement metadata emission.
Behavior: Extracts project components and ensures generated Lean files track the active LLBC/Aeneas baseline revisions exactly.
"""

[[test.artifact]]
package = "stable_slug"
target = "stable_slug"
kind = "llbc"
should_exist = true
    matches_expected_dir = "expected"

[[test.artifact]]
package = "stable_slug"
target = "stable_slug"
kind = "lean"
should_exist = true
    matches_expected_dir = "expected"

[test]
args = ["verify", "--allow-sorry"]
expected_status = "success"
