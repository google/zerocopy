macos-aarch64 = "d2cd6e72bca395a4c8adb9964c8f7cd05692059492c62313c1a2fb8fec08e88d"
macos-aarch64-aeneas = "273be81e1a3b0d140828c466a98ddbda6233bb2049fcc8fe190b55debf8485f7"
macos-aarch64-charon = "debeef127b0bf6dc3fbe8873522963b3057513b1c3242332d0783a88e3c7f0e4"
