macos-x86_64 = "050f5f5010ff9fb793abddf44942de24603c2eb36537d9a977d120d2f9dcaa64"
macos-x86_64-aeneas = "e1b382cbb82c45b499367cb57857610ccf89146b20fecc71449b4a3d4f341e79"

[[test]]
name = "integration"
harness = false
