[package]
name = "cargo-hermes"
edition = "2024"
version = "0.1.0-alpha.1"
description = "Formally verify that your safety comments are correct."
categories = [
  "development-tools::cargo-plugins",
  "development-tools::testing",
  "compilers",
  "mathematics",
  "security",
]
keywords = [
  "verification",
  "cargo",
  "plugin",
  "unsafe",
  "lean",
]
authors = ["Joshua Liebow-Feeser <joshlf@google.com>"]
license = "BSD-2-Clause OR Apache-2.0 OR MIT"
repository = "https://github.com/google/zerocopy/tree/hermes/tools/hermes"
publish = true

exclude = [".*", "testdata"]

[dependencies]
anyhow = "1.0.101"
cargo_metadata = "0.23.1"
clap = { version = "4.5.57", features = ["derive"] }
clap-cargo = { version = "0.18.3", features = ["cargo_metadata"] }
dashmap = "6.1.0"
env_logger = "0.11.8"
log = "0.4.29"
miette = { version = "7.6.0", features = ["derive", "fancy"] }
proc-macro2 = { version = "1.0.105", features = ["span-locations"] }
rayon = "1.11.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
syn = { version = "2.0.114", features = ["full", "visit", "extra-traits", "parsing", "printing"] }
quote = "1.0"
thiserror = "2.0.18"
walkdir = "2.5.0"
indicatif = { version = "0.18.3", features = ["improved_unicode"] }
console = "0.16.2"
sha2 = "0.10"
fs2 = "0.4"
toml = "0.8"
reqwest = { version = "0.12", features = ["blocking", "rustls-tls"] }
dirs = "6.0"
tar = "0.4"
flate2 = "1.0"

[build-dependencies]
toml = "0.8"

[dev-dependencies]
syn = { version = "2.0.114", features = ["printing", "full", "visit", "extra-traits", "parsing"] }
proc-macro2 = { version = "1.0.105", features = ["span-locations"] }
ui_test = "0.30.4"
assert_cmd = "2.1.2"
tempfile = "3.24.0"
predicates = "3.1.3"
tiny_http = "0.12"
datatest-stable = "0.3.3"
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"
which = "6.0"
regex.workspace = true
strip-ansi-escapes = "0.2.1"
similar = "2.7.0"

[package.metadata.build-rs]

# The commit hash of the Aeneas repository to use.
#
# FIXME: Add a CI step to verify that this commit exists and matches the
# toolchain version.
aeneas_rev = "e99c02e27fa0ea0e5d7daec9bcd5874b630fcff3"

# The Lean toolchain version to use. This must match the version of Lean used
# by Aeneas in the `lean-toolchain` file in the commit above.
lean_toolchain = "leanprover/lean4:v4.28.0-rc1"

# The expected Charon version.
#
# This is used by `src/charon.rs` to enforce that the runtime `charon` binary
# matches the version expected by Hermes. This ensures compatibility with the
# generated LLBC format.
#
# FIXME(https://github.com/AeneasVerif/charon/issues/1029): Check Charon commit
# ID once that's supported
#
# FIXME(https://github.com/AeneasVerif/aeneas/issues/783): Check Aeneas
# version/commit ID once that's supported
charon_version = "0.1.174"

[package.metadata.hermes.dependencies.aeneas]
# The per-commit release tag from AeneasVerif/charon
tag = "build-2026.03.17.155205-e99c02e27fa0ea0e5d7daec9bcd5874b630fcff3"

[package.metadata.hermes.dependencies.aeneas.checksums]
linux-x86_64 = "1ab3b4975f23f04534ddabc3110af2d1757587081715b2da7bb21757bf0167a1"
