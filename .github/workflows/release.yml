name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'Cargo.toml'
      - 'zerocopy-derive/Cargo.toml'

# We set no permissions at the top level, and instead set them granularly for
# each job.
permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check-version:
    name: Check if version was updated
    runs-on: ubuntu-latest
    # Don't run this on forks.
    if: github.repository == 'google/zerocopy'
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
      prerelease: ${{ steps.check.outputs.prerelease }}
    env:
      CARGO_ZEROCOPY_AUTO_INSTALL_TOOLCHAIN: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0 # Fetch all history for version comparison and tags

      # Checks whether zerocopy's version (in `Cargo.toml`) or zerocopy-derive's
      # version (in `zerocopy-derive/Cargo.toml`) were updated in this commit.
      # We check below to make sure they're the same; the point of checking both
      # (which is unnecessary if the commit correctly updates both) is to catch
      # situations where one is updated – we want to catch it regardless of
      # *which* one is updated.
      - name: Determine if version was updated
        id: check
        run: |
          set -eo pipefail

          # Get current versions
          #
          # Pre-install toolchains so `rustup` output isn't piped to `jq`.
          ./cargo.sh +stable help > /dev/null
          CUR_VER_ZC=$(./cargo.sh +stable metadata -q --format-version 1 | jq -r '.packages[] | select(.name == "zerocopy").version')
          CUR_VER_DERIVE=$(./cargo.sh +stable metadata -q --format-version 1 | jq -r '.packages[] | select(.name == "zerocopy-derive").version')

          # Get previous versions using cargo metadata by temporarily checking it out
          git checkout -q HEAD^
          # Pre-install toolchains so `rustup` output isn't piped to `jq`.
          ./cargo.sh +stable help > /dev/null
          PREV_VER_ZC=$(./cargo.sh +stable metadata -q --format-version 1 | jq -r '.packages[] | select(.name == "zerocopy").version')
          PREV_VER_DERIVE=$(./cargo.sh +stable metadata -q --format-version 1 | jq -r '.packages[] | select(.name == "zerocopy-derive").version')
          git checkout -q -

          if [ "$CUR_VER_ZC" != "$PREV_VER_ZC" ] || [ "$CUR_VER_DERIVE" != "$PREV_VER_DERIVE" ]; then
            echo "Version change detected."
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CUR_VER_ZC" >> $GITHUB_OUTPUT

            if [[ "${CUR_VER_ZC%+*}" == *-* ]]; then
              echo "prerelease=true" >> $GITHUB_OUTPUT
            else
              echo "prerelease=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Version unchanged."
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  release:
    name: Release to crates.io and GitHub
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    # This environment is configured to require manual review before executing
    # this job.
    environment: release
    permissions:
      contents: write # required to create a git tag and a GitHub Release
      id-token: write # required to publish to crates.io using OIDC
    env:
      CARGO_ZEROCOPY_AUTO_INSTALL_TOOLCHAIN: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Sanity check versions
        run: ./ci/check_versions.sh

      - name: Dry-run publish
        run: |
          set -eo pipefail
          # Temporarily disable vendoring so that `cargo publish` can see the
          # live registry and resolve workspace dependencies correctly.
          mv .cargo/config.toml .cargo/config.toml.bak
          ./cargo.sh +stable publish --dry-run --allow-dirty --package zerocopy-derive --registry crates-io
          mv .cargo/config.toml.bak .cargo/config.toml

      - name: Check if tag already exists
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          set -eo pipefail
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Error: Tag $TAG already exists." >&2
            exit 1
          fi

      - name: Create git tag
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -eo pipefail
          TAG="v$VERSION"
          git config user.name "Google PR Creation Bot"
          git config user.email "github-pull-request-creation-bot@google.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push https://x-access-token:$GH_TOKEN@github.com/$GH_REPO.git "$TAG"
        
      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth

      # NOTE: Relies on OIDC to be configured for this GHA workflow.
      - name: Publish zerocopy-derive
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -eo pipefail
          mv .cargo/config.toml .cargo/config.toml.bak
          ./cargo.sh +stable publish --allow-dirty --package zerocopy-derive --registry crates-io
          mv .cargo/config.toml.bak .cargo/config.toml

      # This should *technically* be unnecessary since `cargo publish` blocks
      # until the published crate is available in the API, but we have observed
      # this failing occasionally, presumably due to eventual consistency. 60
      # seconds is likely overkill, but better safe than sorry.
      - name: Wait for crates.io index propagation
        run: sleep 60

      # NOTE: Relies on OIDC to be configured for this GHA workflow.
      - name: Publish zerocopy
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -eo pipefail
          mv .cargo/config.toml .cargo/config.toml.bak

          # Dry-run first to catch any last-minute issues now that
          # `zerocopy-derive` is on crates.io.
          ./cargo.sh +stable publish --dry-run --allow-dirty --package zerocopy --registry crates-io

          ./cargo.sh +stable publish --allow-dirty --package zerocopy --registry crates-io
          mv .cargo/config.toml.bak .cargo/config.toml

      - name: Create GitHub Release
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          PRERELEASE: ${{ needs.check-version.outputs.prerelease }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eo pipefail
          TAG="v$VERSION"
          ARGS=(
            "$TAG"
            --generate-notes
          )
          if [ "$PRERELEASE" = "true" ]; then
            ARGS+=(--prerelease)
          else
            # Only set --latest if it's not a prerelease.
            ARGS+=(--latest)
          fi
          gh release create "${ARGS[@]}"
