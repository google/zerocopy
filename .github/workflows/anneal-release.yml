name: Anneal Release

on:
  push:
    branches:
      - main
    paths:
      - 'anneal/Cargo.toml'
  pull_request:

permissions: {}

concurrency:
  group: anneal-release
  cancel-in-progress: false

jobs:
  check-version:
    name: Check if version was updated
    runs-on: ubuntu-latest
    # Don't run this on forks.
    if: github.repository == 'google/zerocopy'
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Determine if version was updated
        id: check
        run: |
          set -eo pipefail
          cd anneal
          
          CUR_VER=$(cargo metadata -q --format-version 1 | jq -r '.packages[] | select(.name == "cargo-anneal").version')
          
          git checkout -q HEAD^
          PREV_VER=$(cargo metadata -q --format-version 1 | jq -r '.packages[] | select(.name == "cargo-anneal").version')
          git checkout -q -
          
          if [ "$CUR_VER" != "$PREV_VER" ]; then
            echo "Version change detected."
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CUR_VER" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged."
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  release:
    name: Release to crates.io and GitHub
    needs: check-version
    if: needs.check-version.outputs.changed == 'true' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write # required to create a git tag and a GitHub Release
      id-token: write # required to publish to crates.io using OIDC
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth

      - name: Publish cargo-anneal
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -eo pipefail
          cd anneal
          ./tools/pre-publish.sh
          cargo publish --allow-dirty --registry crates-io

      - name: Create git tag
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -eo pipefail
          TAG="anneal-v$VERSION"
          git config user.name "Google PR Creation Bot"
          git config user.email "github-pull-request-creation-bot@google.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push https://x-access-token:$GH_TOKEN@github.com/$GH_REPO.git "$TAG"

      - name: Create GitHub Release
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eo pipefail
          TAG="anneal-v$VERSION"
          gh release create "$TAG" --generate-notes

  publish-artifacts:
    name: Publish Artifacts (${{ matrix.target }})
    needs: [check-version, release]
    # We use `always()` to ensure this job runs even if the `release` job is
    # skipped (which happens on PRs). We still require `check-version` to
    # succeed to avoid running on failures.
    if: always() && (needs.check-version.result == 'success')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            rust_triple: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: linux-aarch64
            rust_triple: aarch64-unknown-linux-gnu
          - os: macos-15-intel
            target: macos-x86_64
            rust_triple: x86_64-apple-darwin
          - os: macos-latest
            target: macos-aarch64
            rust_triple: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Extract Metadata
        id: meta
        run: |
          set -eo pipefail
          cd anneal
          AENEAS_TAG=$(sed -n 's/^tag = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          RUST_DATE=$(sed -n 's/^date = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          echo "aeneas_tag=$AENEAS_TAG" >> $GITHUB_OUTPUT
          echo "rust_date=$RUST_DATE" >> $GITHUB_OUTPUT

      - name: Install elan
        run: |
          set -eo pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Install zstd (macOS)
        if: runner.os == 'macOS'
        run: brew install zstd

      - name: Download and Package
        env:
          RUST_TRIPLE: ${{ matrix.rust_triple }}
        run: |
          set -eo pipefail
          cd anneal
          
          STAGING_DIR="dist_staging"
          mkdir -p "$STAGING_DIR"
          
          ./tools/build-prebuilt.sh "$RUST_TRIPLE"
          
      - name: Upload Artifact
        if: github.event_name != 'pull_request' && needs.release.result == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check-version.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          gh release upload "anneal-v$VERSION" anneal/anneal-toolchain-$TARGET.tar.zst --clobber

