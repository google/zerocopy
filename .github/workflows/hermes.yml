name: Hermes Tests

on:
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUSTDOCFLAGS: -Dwarnings
  CARGO_ZEROCOPY_AUTO_INSTALL_TOOLCHAIN: 1

jobs:
  hermes_tests:
    name: Hermes Tests
    runs-on: ubuntu-24.04-64core
    defaults:
      run:
        shell: /tmp/docker-shell.sh {0}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Load base image from cache
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: .github/workflows/Dockerfile
          load: true # This loads the resulting image into the local 'docker' daemon
          tags: zerocopy-ci:local
          cache-from: type=gha

      - name: Build Hermes image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: .github/workflows/Dockerfile.hermes
          load: true # This loads the resulting image into the local 'docker' daemon
          tags: zerocopy-hermes:local
          cache-from: type=gha,scope=hermes
          cache-to: type=gha,mode=max,scope=hermes

      - name: Create Docker Shell Wrapper
        shell: bash
        run: |
          set -eo pipefail

          # Ensure the directories exist on the host so Docker doesn't create them as root
          mkdir -p /home/runner/.cargo/registry /home/runner/.cargo/git

          cat << 'EOF' > /tmp/docker-shell.sh
          #!/bin/bash
          # Boot an ephemeral container for the step, mounting the workspace and
          # temp dirs. Explicitly forward GitHub Actions internal state and matrix
          # environment variables.
          docker run --rm -i \
            --workdir "$PWD" \
            -v /home/runner/work:/home/runner/work \
            -v /home/runner/.cargo/registry:/root/.cargo/registry \
            -v /home/runner/.cargo/git:/root/.cargo/git \
            -e GITHUB_ENV -e GITHUB_PATH -e GITHUB_STEP_SUMMARY -e GITHUB_OUTPUT -e GITHUB_WORKSPACE \
            -e CI -e GITHUB_ACTIONS -e GITHUB_ACTOR -e GITHUB_REPOSITORY -e GITHUB_SHA -e GITHUB_REF -e GITHUB_EVENT_NAME \
            zerocopy-hermes:local bash -c "git config --global --add safe.directory '*' && exec bash \"\$1\"" -- "$1"
          EOF
          chmod +x /tmp/docker-shell.sh

      # Run unit tests separately, as they're much less likely to have bugs
      # during local development, and this makes the GitHub Actions output
      # easier to skim (in particular, it's clear at a glance whether a failure
      # is due to unit or integration tests).
      - name: Run unit tests
        working-directory: tools/hermes
        run: cargo test --verbose --bin cargo-hermes

      # We duplicate running unit tests since they're very cheap compared to
      # integration tests, and this way it's easier to be sure that we run all
      # tests instead of specifically trying to carve out unit tests and risk
      # missing test categories.
      - name: Run all tests
        working-directory: tools/hermes
        run: cargo test --verbose

  # Used to signal to branch protections that all other jobs have succeeded.
  all-jobs-succeed:
      # WARNING: This name is load-bearing! It's how GitHub's settings UI configures which jobs
      # to block on. DO NOT change this name without updating the settings UI to match.
      name: All checks succeeded (hermes.yml)
      # On failure, we run and unconditionally exit with a failing status code.
      # On success, this job is skipped. Jobs skipped using `if:` are considered
      # to have succeeded:
      #
      # https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/collaborating-on-repositories-with-code-quality-features/troubleshooting-required-status-checks#handling-skipped-but-required-checks
      if: failure()
      runs-on: ubuntu-latest
      needs: [hermes_tests]
      steps:
        - name: Mark the job as failed
          run: exit 1
