description = """
Purpose: Verifies explicit enum matching logic from inside specifications.
Behavior: Extends a pattern matching proof across all variants of `Enum.A x` and `Enum.B b` from within `/// ```anneal`. Tests the logic lowering for pattern matching logic schemas into Lean constraints.
"""

[[test.artifact]]
package = "transform_lib"
target = "transform_lib"
kind = "lean"
should_exist = true

# Verify Enums Pattern Matching
content_contains = [
    "match self with",
    "| Enum.A x => x > 10",
    "| Enum.B b => b"
]

[test]
stderr_file = "expected.stderr"
expected_status = "failure"
args = ["verify", "--allow-sorry", "--unsound-allow-is-valid"]
