description = """
Purpose: Validates robustness of Charon CLI message interception.
Behavior: Intercepts parsed JSON messages interleaved with raw unstructured text `Line 1 from charon`. Assures the Anneal diagnostic monitor properly processes JSON segments without choking on unstructured noise.
"""

[test]
extra_inputs = ["mock_charon_output.json"]
stderr_file = "expected.stderr"
args = ["verify", "--allow-sorry"]
expected_status = "failure"

[test.mock]
charon = "mock_charon.sh"
