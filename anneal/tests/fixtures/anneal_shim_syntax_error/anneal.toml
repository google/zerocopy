description = """
Purpose: Tests Anneal' internal parsing fail-safes.
Behavior: Introduces a malformed token stream (`pub fn oops((`) and leverages an empty Charon mock. Asserts that Anneal aborts with an internal syntax error diagnostic immediately upon discovering the un-parseable file instead of delegating to Charon.
"""

[test]
stderr_file = "expected.stderr"
args = ["verify", "--allow-sorry"]
expected_status = "failure"

[test.mock]
charon = "mock_charon_output.json"
