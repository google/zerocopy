description = """
Purpose: Verifies terminal degradation upon catastrophic `cargo` build script aborts.
Behavior: Triggers a `panic!("Boom")` immediately in `build.rs`. Confirms Anneal cascades the raw panic out correctly to stderr rather than swallowing it.
"""

[test]
expected_status = "failure"
stderr_file = "expected.stderr"
args = ["verify", "--allow-sorry"]
